name: CI Pipeline

# ──────────────────────────────────────────────────────────
# Task 1: Trigger block (push, pull_request, schedule)
# ──────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"          # Every Monday at 06:00 UTC

# ──────────────────────────────────────────────────────────
# Task 3: Job dependency structure
# ──────────────────────────────────────────────────────────
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ──────────────────────────────────────────────────────
      # Task 5: Dependency cache step
      # ──────────────────────────────────────────────────────
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  lint:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Linting step would go here (e.g., flake8)."

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "Docker build step would go here (for bonus)."

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, build-docker]
    if: github.event_name == 'push'
    # ──────────────────────────────────────────────────────────
    # Task 4: Secrets reference block and deploy step
    # ──────────────────────────────────────────────────────────
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
      DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
      DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
